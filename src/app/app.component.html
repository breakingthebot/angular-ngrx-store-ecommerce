<div class="app-layout">
  <!-- Top Navigation Header -->
  <mat-toolbar color="primary" class="main-navbar">
    <div class="nav-container">
      <a routerLink="/" class="brand-link">
        <mat-icon class="brand-icon">shopping_bag</mat-icon>
        <span class="brand-name">PulseMarket</span>
        <span class="brand-tag">NgRx</span>
      </a>

      <div class="nav-links">
        <a mat-button routerLink="/catalog" routerLinkActive="active-link" class="nav-btn" matTooltip="Catalog">
          <mat-icon>storefront</mat-icon>
          <span class="nav-btn-text">Catalog</span>
        </a>

        <a mat-button routerLink="/orders" routerLinkActive="active-link" class="nav-btn" matTooltip="Orders">
          <mat-icon>local_shipping</mat-icon>
          <span class="nav-btn-text">Orders</span>
        </a>

        <a mat-button routerLink="/wishlist" routerLinkActive="active-link" class="nav-btn" matTooltip="Wishlist">
          <mat-icon [matBadge]="wishlistTotalItems$ | async" matBadgeColor="accent" [matBadgeHidden]="(wishlistTotalItems$ | async) === 0">
            favorite
          </mat-icon>
          <span class="nav-btn-text">Wishlist</span>
        </a>

        <!-- Cart Trigger Button -->
        <button mat-icon-button (click)="toggleCart()" class="cart-trigger-btn">
          <mat-icon [matBadge]="cartTotalItems$ | async" matBadgeColor="warn" [matBadgeHidden]="(cartTotalItems$ | async) === 0">
            shopping_cart
          </mat-icon>
        </button>
      </div>
    </div>
  </mat-toolbar>

  <!-- Main View Content Outlet -->
  <main class="main-body">
    <router-outlet></router-outlet>
  </main>

  <!-- Side Shopping Cart Drawer -->
  <app-cart-drawer></app-cart-drawer>
</div>
